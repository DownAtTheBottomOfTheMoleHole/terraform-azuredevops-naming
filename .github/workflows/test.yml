---
name: terraform-tests

# Native `terraform test` runs that gate every pull request and every push
# to a release branch. The module ships only `random` provider config, so
# tests run without any cloud credentials.

on:
  pull_request:
    branches:
      - main
      - "release/**"
    paths:
      - "**.tf"
      - "tests/**"
      - ".github/workflows/test.yml"
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "**.tf"
      - "tests/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-test:
    name: terraform test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        terraform_version:
          - "1.14.0" # required_version floor
          - "latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ matrix.terraform_version }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform_version }}
          terraform_wrapper: false

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform test
        run: terraform test -verbose
