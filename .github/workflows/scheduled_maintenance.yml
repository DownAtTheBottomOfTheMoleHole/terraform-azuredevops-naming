---
name: 🌙 Scheduled Maintenance

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Sync shared secrets to sister modules (only on push to main) ──────────
  secret-syncer:
    name: Sync secrets to other modules
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: jpoehnelt/secrets-sync-action@7840777f242539d96b60477b66aa1c179e7644ea # v1.10.0 # DevSkim: ignore DS117838
        with:
          secrets: |
            ^ADO_PAT$
            ^GIT_SSH_KEY$
            ^INFRACOST_API_KEY$
            ^PAT$
            ^SYNCER$
          repositories: |
            ^DownAtTheBottomOfTheMoleHole/terraform_*
            ^DownAtTheBottomOfTheMoleHole/terraform-*
          dry_run: false
          github_token: ${{ secrets.SYNCER }}
          concurrency: 10

  # ─── MegaLinter (full codebase) ────────────────────────────────────────────
  megalinter-nightly:
    name: MegaLinter (Full Codebase)
    if: github.event_name != 'push'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/megalinter.yml@main
    secrets: inherit
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    with:
      apply-fixes: all
      create-fix-pr: true
      validate-all: true

  # ─── Stale issues / PRs ────────────────────────────────────────────────────
  stale:
    name: Mark and Close Stale
    if: github.event_name != 'push'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/stale.yml@main
    secrets: inherit
    permissions:
      issues: write
      pull-requests: write

  # ─── OSSF Scorecard ────────────────────────────────────────────────────────
  scorecard:
    name: OSSF Scorecard
    if: github.event_name != 'push'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/scorecard.yml@main
    secrets: inherit
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

  # ─── terraform-docs nightly refresh (matrix) ───────────────────────────────
  terraform-docs-nightly:
    name: "terraform-docs nightly (${{ matrix.target.name }})"
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: README.md
            config: .readme-terraform-docs.yml
            output: README.md
            working-dir: .
          - name: TERRAFORM.md
            config: .terraform-terraform-docs.yml
            output: TERRAFORM.md
            working-dir: .
          - name: examples/example1
            config: ../../.example1-readme-terraform-docs.yml
            output: README.md
            working-dir: examples/example1
          - name: examples/example2
            config: ../../.example2-readme-terraform-docs.yml
            output: README.md
            working-dir: examples/example2
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Render terraform docs (${{ matrix.target.name }})
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: ${{ matrix.target.config }}
          output-file: ${{ matrix.target.output }}
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: ${{ matrix.target.working-dir }}

  # ─── Open a PR with any docs drift ─────────────────────────────────────────
  terraform-docs-pr:
    name: terraform-docs nightly PR
    if: github.event_name != 'push'
    needs: terraform-docs-nightly
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create pull request for docs updates
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/terraform-docs-nightly
          commit-message: "[terraform-docs] nightly refresh"
          title: "[Terraform-docs] Nightly refresh"
          body: |
            Automated terraform-docs refresh from scheduled maintenance.
          labels: bot
          delete-branch: true
