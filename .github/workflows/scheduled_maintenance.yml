name: 🌙 Scheduled Maintenance

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  megalinter-nightly:
    name: MegaLinter (Full Codebase)
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/megalinter.yml@9b5d5baa78b012eef681cbc89d4dd8ac6beab90b # main
    secrets: inherit
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    with:
      apply-fixes: all
      create-fix-pr: true
      validate-all: true

  terraform-docs-nightly:
    name: Terraform Docs Refresh
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Render terraform docs in README.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: .config/.readme-terraform-docs.yml
          output-file: README.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: .

      - name: Render terraform docs in TERRAFORM.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: .config/.terraform-terraform-docs.yml
          output-file: TERRAFORM.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: .

      - name: Render terraform docs in examples/example1/README.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: ./.config/.example1-readme-terraform-docs.yml
          output-file: README.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: examples/example1

      - name: Render terraform docs in examples/example2/README.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: ./.config/.example1-readme-terraform-docs.yml
          output-file: README.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: examples/example2

      - name: Create pull request for docs updates
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/terraform-docs-nightly
          commit-message: "[terraform-docs] nightly refresh"
          title: "[Terraform-docs] Nightly refresh"
          body: |
            Automated terraform-docs refresh from scheduled maintenance.
          labels: bot
          delete-branch: true
