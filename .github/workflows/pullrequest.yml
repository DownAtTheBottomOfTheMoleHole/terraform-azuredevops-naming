name: 🧪 Pull Request Checks

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize, ready_for_review]
  pull_request_target:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read

jobs:
  terraform-docs:
    name: Terraform Docs
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Render terraform docs in README.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: .readme-terraform-docs.yml
          git-commit-message: "[terraform-docs] update README.md"
          git-push: true
          git-push-sign-off: true
          git-push-user-email: DBMH-terraform-docs@dbmh.com
          git-push-user-name: DBMH-terraform-docs
          indention: 4
          output-file: README.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: .

      - name: Render terraform docs in TERRAFORM.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: .terraform-terraform-docs.yml
          git-commit-message: "[terraform-docs] update TERRAFORM.md"
          git-push: true
          git-push-sign-off: true
          git-push-user-email: DBMH-terraform-docs@dbmh.com
          git-push-user-name: DBMH-terraform-docs
          indention: 4
          output-file: TERRAFORM.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: .

      - name: Render terraform docs in examples/example1/README.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: ./.example1-readme-terraform-docs.yml
          git-commit-message: "[terraform-docs] update examples README.md"
          git-push: true
          git-push-sign-off: true
          git-push-user-email: DBMH-terraform-docs@dbmh.com
          git-push-user-name: DBMH-terraform-docs
          indention: 1
          output-file: README.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: examples/example1

      - name: Render terraform docs in examples/example2/README.md
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: ./.example2-readme-terraform-docs.yml
          git-commit-message: "[terraform-docs] update examples README.md"
          git-push: true
          git-push-sign-off: true
          git-push-user-email: DBMH-terraform-docs@dbmh.com
          git-push-user-name: DBMH-terraform-docs
          indention: 1
          output-file: README.md
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: examples/example2

  megalinter:
    name: MegaLinter
    if: github.event_name == 'pull_request'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/megalinter.yml@main
    secrets: inherit
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    with:
      apply-fixes: all
      create-fix-pr: false
      validate-all: false

  auto-merge:
    name: Auto Merge Bots
    if: github.event_name == 'pull_request_target'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/auto-merge.yml@main
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
