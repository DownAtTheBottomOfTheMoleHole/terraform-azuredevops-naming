---
name: 🧪 Pull Request Checks

on:
  pull_request:
    branches: [main, "release/**"]
    types: [opened, edited, reopened, synchronize, ready_for_review]
  pull_request_target:
    branches: [main, "release/**"]
    types:
      [
        opened,
        edited,
        synchronize,
        reopened,
        ready_for_review,
        labeled,
        unlabeled,
      ]

permissions:
  contents: read

jobs:
  # ─── PR title (commitlint) ─────────────────────────────────────────────────
  commitlint:
    name: Lint PR Title
    if: github.event_name == 'pull_request'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/commitlint.yml@main
    secrets: inherit
    permissions:
      pull-requests: read

  # ─── Dependency review (PRs only, fork-safe) ───────────────────────────────
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/dependency-review.yml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write

  # ─── PR labelling ──────────────────────────────────────────────────────────
  label-pr:
    name: Label PR
    if: github.event_name == 'pull_request'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/label-pr.yml@main
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write

  # ─── First-time contributor greeting ───────────────────────────────────────
  greet:
    name: Greet First-Time Contributors
    if: github.event_name == 'pull_request_target' && github.event.action == 'opened'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/greet.yml@main
    secrets: inherit
    permissions:
      issues: write
      pull-requests: write

  # ─── terraform-docs (matrix over the four targets) ─────────────────────────
  terraform-docs:
    name: 'terraform-docs (${{ matrix.target.name }})'
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: README.md
            config: .readme-terraform-docs.yml
            output: README.md
            working-dir: .
            indention: 4
            commit-message: '[terraform-docs] update README.md'
          - name: TERRAFORM.md
            config: .terraform-terraform-docs.yml
            output: TERRAFORM.md
            working-dir: .
            indention: 4
            commit-message: '[terraform-docs] update TERRAFORM.md'
          - name: examples/example1
            config: ../../.example1-readme-terraform-docs.yml
            output: README.md
            working-dir: examples/example1
            indention: 1
            commit-message: '[terraform-docs] update examples/example1 README.md'
          - name: examples/example2
            config: ../../.example2-readme-terraform-docs.yml
            output: README.md
            working-dir: examples/example2
            indention: 1
            commit-message: '[terraform-docs] update examples/example2 README.md'
    steps:
      - name: ⬇️ Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Render terraform docs (${{ matrix.target.name }})
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          config-file: ${{ matrix.target.config }}
          git-commit-message: ${{ matrix.target.commit-message }}
          git-push: true
          git-push-sign-off: true
          git-push-user-email: DBMH-terraform-docs@dbmh.com
          git-push-user-name: DBMH-terraform-docs
          indention: ${{ matrix.target.indention }}
          output-file: ${{ matrix.target.output }}
          recursive: false
          template: "<!-- start_of_terraform_docs -->\n{{ .Content }}\n<!-- end_of_terraform_docs -->"
          working-dir: ${{ matrix.target.working-dir }}

  # ─── MegaLinter (changed files only on PR) ─────────────────────────────────
  megalinter:
    name: MegaLinter
    if: github.event_name == 'pull_request'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/megalinter.yml@main
    secrets: inherit
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    with:
      apply-fixes: all
      create-fix-pr: false
      validate-all: false

  # ─── Renovate auto-merge (eligible bot PRs) ────────────────────────────────
  auto-merge:
    name: Auto Merge Bots
    if: github.event_name == 'pull_request_target'
    uses: DownAtTheBottomOfTheMoleHole/.github/.github/workflows/auto-merge.yml@main
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
